<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animation Challenge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Animation Examples</h1>
  <p class="desc">Button hover, loading spinner and fade in card</p>

  <!-- button hover animation -->
  <div class="section">
    <h2>Button Hover</h2>
    <button class="anim-btn">Hover Me</button>
  </div>

  <!-- loading spinner -->
  <div class="section">
    <h2>Loading Spinner</h2>
    <div class="spinner"></div>
  </div>

  <!-- fade in card -->
  <div class="section">
    <h2>Fade In Card</h2>
    <div class="fade-card">
      <h3>Hello!</h3>
      <p>This card fades in when page loads.</p>
    </div>
  </div>

  <!-- navigation links -->
  <div class="nav-links">
    <a href="flexbox.html">Flexbox</a>
    <a href="grid.html">Grid</a>
    <a href="animation.html">Animation</a>
  </div>

</body>
</html>
